title: Ship Your [SaaS]{class="text-primary"} at Light Speed
description: Build production-ready SaaS applications with Nuxt UI's powerful components, authentication flows, and enterprise features.
seo:
  title: Nuxt SaaS Template
  description: Create stunning, fast and production-ready SaaS applications with Nuxt UI. 100+ Vue components, authentication, dark mode, and enterprise features built on Tailwind CSS.
navigation: false

# Hero Section - Dark, centered with glowing icon
hero:
  icon: i-lucide-rocket
  title: Build Better Software
  subtitle: Everything you need to ship production-ready SaaS applications. Powered by Nuxt UI components, TypeScript, and modern web standards.
  cta:
    primary:
      label: Get Started
      icon: i-lucide-arrow-right
      trailing: true
      to: https://ui.nuxt.com/docs/getting-started/installation/nuxt
      target: _blank
    secondary:
      label: View on GitHub
      icon: i-simple-icons-github
      to: https://github.com/nuxt-ui-templates/saas
      target: _blank

# 2x2 Feature Grid - Dark blocks with accent borders
featureGrid:
  title: Core Capabilities
  description: Four pillars of modern web development
  items:
    - icon: i-lucide-package
      title: 100+ UI Components
      description: From buttons to modals, data tables to forms - all styled with Tailwind CSS and accessible out of the box.
      accent: blue
    - icon: i-lucide-shield
      title: Authentication Ready
      description: Pre-built login, signup, and password reset flows. Just connect your backend and start onboarding users.
      accent: blue
    - icon: i-lucide-code-2
      title: TypeScript First
      description: Full TypeScript support with auto-completion, type safety, and IntelliSense for every component and composable.
      accent: blue
    - icon: i-lucide-zap
      title: Edge Performance
      description: Optimized for Core Web Vitals with automatic code splitting, lazy loading, and SSR/SSG support.
      accent: blue

# Feature Banner - Gradient overlay
banner:
  title: Ship Faster with Modern Tooling
  subtitle: Stop building from scratch. Focus on your unique features while Nuxt UI handles the foundations with battle-tested components and patterns.
  background: gradient

# Platform/Tools Section - Solid blue with icon row
platform:
  title: Built for Developers
  description: Everything works together seamlessly. From components to authentication, fonts to icons - one unified experience.
  tools:
    - icon: i-lucide-terminal
      label: CLI
    - icon: i-lucide-code
      label: TypeScript
    - icon: i-lucide-palette
      label: Tailwind
    - icon: i-lucide-moon
      label: Dark Mode
    - icon: i-lucide-globe
      label: i18n
    - icon: i-lucide-search
      label: SEO
    - icon: i-lucide-accessibility
      label: A11y
    - icon: i-lucide-smartphone
      label: Responsive

# Product Showcase Grid - Light background, 2x3 cards
showcase:
  title: Platform Features
  description: Everything you need to build, deploy, and scale your application.
  items:
    - icon: i-lucide-layout-dashboard
      title: Dashboard Ready
      description: Pre-built dashboard layouts with charts, tables, and widgets.
    - icon: i-lucide-users
      title: User Management
      description: Complete user profiles, roles, and permissions system.
    - icon: i-lucide-credit-card
      title: Billing Integration
      description: Stripe-ready subscription and payment flows.
    - icon: i-lucide-mail
      title: Email Templates
      description: Transactional email templates for notifications.
    - icon: i-lucide-bar-chart
      title: Analytics Built-in
      description: Track user behavior and business metrics.
    - icon: i-lucide-cloud
      title: Cloud Deploy
      description: One-click deployment to Vercel, Netlify, or Cloudflare.

# What's New Section - Light gray
whatsNew:
  title: What's New
  description: Latest updates and improvements to the platform.
  items:
    - title: Nuxt 4 Support
      description: Full compatibility with Nuxt 4 and Nitro 3
      date: June 2025
    - title: Nuxt UI v4 Components
      description: Upgraded to the latest Nuxt UI component library
      date: May 2025
    - title: USWDS Design Tokens
      description: Government-grade accessibility with USWDS color and typography tokens
      date: April 2025
    - title: AI Assistant Integration
      description: Built-in AI chat assistant for documentation pages
      date: March 2025

# CTA Banner - Gradient
cta:
  title: Ready to Build Something Great?
  description: Join thousands of developers shipping with Nuxt UI. Get started in minutes.
  links:
    - label: Start Building
      to: https://ui.nuxt.com/docs/getting-started/installation/nuxt
      target: _blank
      icon: i-lucide-arrow-right
      trailing: true
    - label: View Documentation
      to: https://github.com/nuxt-ui-templates/saas
      target: _blank
      icon: i-lucide-book

# Resource Footer - 4 columns
resourceFooter:
  columns:
    - icon: i-lucide-globe
      title: Resources
      links:
        - label: Documentation
          to: /docs
        - label: Components
          to: https://ui.nuxt.com
          target: _blank
        - label: Examples
          to: /docs/essentials/code-blocks
        - label: Templates
          to: https://nuxt.com/templates
          target: _blank
    - icon: i-lucide-book-open
      title: Learn
      links:
        - label: Getting Started
          to: /docs/getting-started
        - label: Installation
          to: /docs/getting-started/installation
        - label: Usage Guide
          to: /docs/getting-started/usage
        - label: API Reference
          to: https://ui.nuxt.com/components
          target: _blank
    - icon: i-lucide-users
      title: Community
      links:
        - label: GitHub
          to: https://github.com/nuxt-ui-templates/saas
          target: _blank
        - label: Discord
          to: https://discord.gg/nuxt
          target: _blank
        - label: Twitter
          to: https://twitter.com/nuxt_js
          target: _blank
        - label: Blog
          to: /blog
    - icon: i-lucide-life-buoy
      title: Support
      links:
        - label: FAQ
          to: /docs
        - label: Troubleshooting
          to: /docs
        - label: Contact
          to: /docs
        - label: Status
          to: /docs
